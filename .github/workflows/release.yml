name: Release

# Build cross-platform static binaries and publish a GitHub release whenever a
# `v*` tag is pushed. Mirrors pageton/dbview: each platform ships BOTH a raw
# binary (e.g. mtgo-bot-api_0.1.0_linux_amd64, ..._windows_amd64.exe) AND a
# packaged archive (binary + README), plus a combined sha256 checksums file.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: mtgo-bot-api

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"   # tag is vX.Y.Z; version string is X.Y.Z
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          EXT="${{ matrix.ext }}"
          BASE="${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}"

          mkdir -p dist dist/package

          # Raw binary for direct download (e.g. mtgo-bot-api_0.1.0_linux_amd64).
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X github.com/mtgo-labs/mtgo-bot-api/internal/version.Version=${VERSION}" \
            -o "dist/${BASE}${EXT}" ./cmd/${APP_NAME}

          # Packaged archive (binary + README) under dist/package to avoid
          # colliding with the raw binary name in dist/.
          PKGDIR="dist/package/${BASE}"
          mkdir -p "${PKGDIR}"
          cp "dist/${BASE}${EXT}" "${PKGDIR}/${APP_NAME}${EXT}"
          cp README.md "${PKGDIR}/"
          if [ "$GOOS" = "windows" ]; then
            (cd dist/package && zip -rq "../${BASE}.zip" "${BASE}")
          else
            tar -C dist/package -czf "dist/${BASE}.tar.gz" "${BASE}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ env.APP_NAME }}_*_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            *.tar.gz *.zip \
            ${APP_NAME}_*_linux_amd64 \
            ${APP_NAME}_*_linux_arm64 \
            ${APP_NAME}_*_darwin_amd64 \
            ${APP_NAME}_*_darwin_arm64 \
            ${APP_NAME}_*_windows_amd64.exe \
            > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ env.APP_NAME }}_*_linux_amd64
            dist/${{ env.APP_NAME }}_*_linux_arm64
            dist/${{ env.APP_NAME }}_*_darwin_amd64
            dist/${{ env.APP_NAME }}_*_darwin_arm64
            dist/${{ env.APP_NAME }}_*_windows_amd64.exe
            dist/checksums.txt
